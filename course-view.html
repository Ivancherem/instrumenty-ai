<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Просмотр курса — Instrumenty-AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233498db'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-weight='bold'%3E📚%3C/text%3E%3C/svg%3E">
    <style>
        .course-player {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .course-info {
            padding: 2rem;
        }
        .course-title {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        .lessons-list {
            margin-top: 2rem;
        }
        .lesson-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #eee;
            cursor: pointer;
            transition: background 0.3s;
        }
        .lesson-item:hover {
            background: #f8f9fa;
        }
        .lesson-item.active {
            background: #e8f4fd;
            border-left: 4px solid #3498db;
        }
        .lesson-item.completed {
            opacity: 0.7;
        }
        .lesson-number {
            width: 35px;
            height: 35px;
            background: #3498db;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }
        .lesson-item.completed .lesson-number {
            background: #27ae60;
        }
        .lesson-title {
            flex: 1;
            font-weight: bold;
        }
        .lesson-duration {
            color: #999;
            font-size: 0.9rem;
        }
        .complete-badge {
            color: #27ae60;
            font-size: 1.2rem;
        }
        .progress-bar {
            background: #ecf0f1;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
            margin: 1rem 0;
        }
        .progress-fill {
            background: #3498db;
            height: 100%;
            width: 0%;
            transition: width 0.3s;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1rem;
            color: #3498db;
            text-decoration: none;
        }
        .watch-btn {
            background: #27ae60;
            color: white;
            border: none;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .watch-btn.completed {
            background: #95a5a6;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">📚 Instrumenty-AI</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="tools.html">Инструменты</a></li>
                <li><a href="blog.html">Блог</a></li>
                <li><a href="courses.html">Курсы</a></li>
                <li><a href="my-courses.html">Мои курсы</a></li>
                <li><a href="about.html">О проекте</a></li>
                <li><a href="contacts.html">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <a href="my-courses.html" class="back-link">← Вернуться к моим курсам</a>
        
        <div class="course-player">
            <div class="video-container" id="videoContainer">
                <iframe id="videoFrame" src="https://rutube.ru/play/embed/12d055a5b4f61ba3d5908f6d9b307f8f/" frameborder="0" allowfullscreen></iframe>
            </div>
            <div class="course-info">
                <h1 class="course-title" id="courseTitle">Введение в искусственный интеллект</h1>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="progressText">Прогресс: 0%</p>
                <div class="lessons-list" id="lessonsList"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Instrumenty-AI. Образовательный портал.</p>
    </footer>

    <script>
        // Данные курса с видео на Rutube
        const courseData = {
            id: 1,
            title: "Введение в искусственный интеллект",
            lessons: [
                { 
                    id: 1, 
                    title: "Что такое искусственный интеллект?", 
                    duration: "27 мин",
                    videoId: "12d055a5b4f61ba3d5908f6d9b307f8f"
                },
                { 
                    id: 2, 
                    title: "История развития ИИ", 
                    duration: "20 мин",
                    videoId: "d637428be6cdb9fc26010452c7b0940c"
                },
                { 
                    id: 3, 
                    title: "Основные направления ИИ", 
                    duration: "25 мин",
                    videoId: "1d639cb8af9a44a6a02e925ed72dee0b"
                },
                { 
                    id: 4, 
                    title: "Нейросети и глубокое обучение", 
                    duration: "30 мин",
                    videoId: "481d560516b2a711a6d38b3eaed92c89"
                },
                { 
                    id: 5, 
                    title: "Практическое применение ИИ", 
                    duration: "20 мин",
                    videoId: "e819d5d42d8953d7c32ac0dd748df88a"
                }
            ]
        };

        let currentLesson = 0;
        let completedLessons = [];

        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function loadProgress() {
            const courseId = getUrlParam('id') || '1';
            let saved = localStorage.getItem(`course_progress_${courseId}`);
            if (saved) {
                completedLessons = JSON.parse(saved);
            } else {
                completedLessons = [];
            }
        }

        function saveProgress() {
            const courseId = getUrlParam('id') || '1';
            localStorage.setItem(`course_progress_${courseId}`, JSON.stringify(completedLessons));
        }

        function updateProgressBar() {
            const total = courseData.lessons.length;
            const completed = completedLessons.length;
            const percent = Math.round((completed / total) * 100);
            document.getElementById('progressFill').style.width = `${percent}%`;
            document.getElementById('progressText').innerHTML = `Прогресс: ${completed} из ${total} уроков (${percent}%)`;
        }

        function playLesson(lessonIndex) {
            currentLesson = lessonIndex;
            const lesson = courseData.lessons[lessonIndex];
            const videoId = lesson.videoId;
            const videoFrame = document.getElementById('videoFrame');
            videoFrame.src = `https://rutube.ru/play/embed/${videoId}/`;
            
            const lessonItems = document.querySelectorAll('.lesson-item');
            lessonItems.forEach((item, idx) => {
                if (idx === lessonIndex) {
                    item.classList.add('active');
                } else {
                    item.classList.remove('active');
                }
            });
        }

        function markCompleted(lessonId, lessonIndex) {
            if (!completedLessons.includes(lessonId)) {
                completedLessons.push(lessonId);
                saveProgress();
                updateProgressBar();
                renderLessons();
                alert(`✅ Урок "${courseData.lessons[lessonIndex].title}" пройден!`);
            } else {
                alert(`⚠️ Вы уже прошли этот урок.`);
            }
        }

        function renderLessons() {
            const container = document.getElementById('lessonsList');
            container.innerHTML = courseData.lessons.map((lesson, idx) => {
                const isCompleted = completedLessons.includes(lesson.id);
                return `
                    <div class="lesson-item ${isCompleted ? 'completed' : ''} ${currentLesson === idx ? 'active' : ''}" onclick="playLesson(${idx})">
                        <div class="lesson-number">${idx + 1}</div>
                        <div class="lesson-title">${lesson.title}</div>
                        <div class="lesson-duration">⏱ ${lesson.duration}</div>
                        ${!isCompleted ? 
                            `<button class="watch-btn" onclick="event.stopPropagation(); markCompleted(${lesson.id}, ${idx})">✅ Отметить пройденным</button>` : 
                            `<span class="complete-badge">✅ Пройдено</span>`
                        }
                    </div>
                `;
            }).join('');
        }

        function init() {
            loadProgress();
            updateProgressBar();
            renderLessons();
            if (courseData.lessons.length > 0) {
                playLesson(0);
            }
        }

        init();
    </script>
</body>
</html>
