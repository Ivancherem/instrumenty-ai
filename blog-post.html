<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233498db'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-weight='bold'%3E📚%3C/text%3E%3C/svg%3E">
    <style>
        .blog-post {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .post-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #eee;
        }
        .post-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .post-title {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        .post-date {
            color: #999;
            font-size: 0.9rem;
        }
        .post-content {
            line-height: 1.8;
            font-size: 1.1rem;
        }
        .post-content h2 {
            color: #3498db;
            margin: 1.5rem 0 1rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #3498db;
            text-decoration: none;
        }
        .btn {
            background: #3498db;
            color: white;
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 1rem;
        }
        .quiz-question {
            background: #f0f7ff;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }
        .quiz-option {
            padding: 0.5rem;
            margin: 0.3rem 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
        }
        .quiz-option.correct {
            background: #27ae60;
            color: white;
        }
        .quiz-option.wrong {
            background: #e74c3c;
            color: white;
        }
        .task-block {
            background: #e8f4fd;
            padding: 1rem;
            border-radius: 10px;
            margin: 1rem 0;
        }
        textarea {
            width: 100%;
            padding: 0.5rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin: 0.5rem 0;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo"><a href="index.html">📚 Instrumenty-AI</a></div>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="tools.html">Инструменты</a></li>
                <li><a href="blog.html">Блог</a></li>
                <li><a href="courses.html">Курсы</a></li>
                <li><a href="my-courses.html">Мои курсы</a></li>
                <li><a href="about.html">О проекте</a></li>
                <li><a href="contacts.html">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div id="postContainer"></div>
        <a href="blog.html" class="back-link">← Вернуться к списку статей</a>
    </main>

    <footer><p>&copy; 2026 Instrumenty-AI. Образовательный портал.</p></footer>

    <script>
        // ВСЕ СТАТЬИ
        const articles = {
            1: {
                title: "Как ИИ меняет образование",
                date: "27 марта 2026",
                icon: "🤖",
                content: `
                    <h2>Искусственный интеллект в образовании</h2>
                    <p>Искусственный интеллект стремительно меняет подходы к обучению. Технологии помогают создавать персонализированные образовательные траектории и автоматизировать рутинные задачи.</p>
                    
                    <h2>Персонализация обучения</h2>
                    <p>Главное преимущество ИИ — возможность адаптировать учебный материал под каждого ученика. Системы анализируют успеваемость и предлагают индивидуальные задания.</p>
                    
                    <div class="task-block">
                        <h3>📝 Задание</h3>
                        <p>Как бы вы использовали ИИ для помощи ученику, который отстает по математике?</p>
                        <textarea id="answer1" rows="3" placeholder="Напишите ответ..."></textarea>
                        <button class="btn" onclick="saveAnswer(1)">Сохранить ответ</button>
                        <div id="saved1" style="color:green; margin-top:5px;"></div>
                    </div>
                    
                    <div class="quiz-question">
                        <p><strong>Вопрос:</strong> Что является главным преимуществом ИИ в образовании?</p>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Адаптация материала под ученика')">А) Автоматическая проверка тестов</div>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Адаптация материала под ученика')">Б) Адаптация материала под ученика</div>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Адаптация материала под ученика')">В) Создание презентаций</div>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Адаптация материала под ученика')">Г) Видео-уроки</div>
                    </div>
                `
            },
            2: {
                title: "5 методов эффективного обучения",
                date: "25 марта 2026",
                icon: "📚",
                content: `
                    <h2>Научные подходы к обучению</h2>
                    <p>Исследования показывают, что не все методы одинаково эффективны. Вот 5 научно доказанных техник.</p>
                    <ul>
                        <li><strong>Активное повторение</strong> — вспоминайте материал без подсказок</li>
                        <li><strong>Метод Помодоро</strong> — 25 минут работы, 5 отдыха</li>
                        <li><strong>Объяснение другим</strong> — учите, объясняя</li>
                        <li><strong>Интервальное повторение</strong> — повторяйте через увеличивающиеся интервалы</li>
                        <li><strong>Тестирование</strong> — проверяйте себя</li>
                    </ul>
                    <div class="task-block">
                        <h3>📝 Задание</h3>
                        <p>Какой метод вам ближе всего? Почему?</p>
                        <textarea id="answer2" rows="3" placeholder="Напишите ответ..."></textarea>
                        <button class="btn" onclick="saveAnswer(2)">Сохранить ответ</button>
                        <div id="saved2" style="color:green; margin-top:5px;"></div>
                    </div>
                `
            },
            3: {
                title: "Подготовка к экзаменам: пошаговый план",
                date: "22 марта 2026",
                icon: "🎓",
                content: `
                    <h2>Стратегия успешной подготовки</h2>
                    <p>Составьте план за 2-3 недели. Разбейте материал на блоки. Используйте тесты для самопроверки. Обязательно высыпайтесь перед экзаменом.</p>
                    <div class="task-block">
                        <h3>📝 Задание</h3>
                        <p>Напишите свой план подготовки к ближайшему экзамену.</p>
                        <textarea id="answer3" rows="3" placeholder="Напишите ответ..."></textarea>
                        <button class="btn" onclick="saveAnswer(3)">Сохранить ответ</button>
                        <div id="saved3" style="color:green; margin-top:5px;"></div>
                    </div>
                `
            },
            4: {
                title: "Лучшие бесплатные образовательные ресурсы",
                date: "20 марта 2026",
                icon: "💻",
                content: `
                    <h2>Где учиться бесплатно</h2>
                    <ul>
                        <li><strong>Stepik.org</strong> — курсы по программированию, математике</li>
                        <li><strong>Coursera.org</strong> — курсы от ведущих вузов</li>
                        <li><strong>Duolingo</strong> — изучение языков</li>
                        <li><strong>ПостНаука</strong> — видеолекции ученых</li>
                    </ul>
                `
            },
            5: {
                title: "Нейропластичность: как мозг учится",
                date: "18 марта 2026",
                icon: "🧠",
                content: `
                    <h2>Что такое нейропластичность</h2>
                    <p>Нейропластичность — это способность мозга создавать новые нейронные связи на протяжении всей жизни. Чтобы учиться эффективно: высыпайтесь, пробуйте новое, регулярно повторяйте.</p>
                `
            },
            6: {
                title: "Как не прокрастинировать: рабочие техники",
                date: "15 марта 2026",
                icon: "🎯",
                content: `
                    <h2>Почему мы откладываем дела</h2>
                    <p>Прокрастинация — это способ справиться со стрессом. Техника 2 минут: если дело занимает меньше 2 минут — сделайте сразу. Метод Помодоро помогает войти в рабочий поток.</p>
                    <div class="task-block">
                        <h3>📝 Задание</h3>
                        <p>Какая техника борьбы с прокрастинацией помогла бы вам?</p>
                        <textarea id="answer6" rows="3" placeholder="Напишите ответ..."></textarea>
                        <button class="btn" onclick="saveAnswer(6)">Сохранить ответ</button>
                        <div id="saved6" style="color:green; margin-top:5px;"></div>
                    </div>
                `
            }
        };

        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function saveAnswer(articleId) {
            const answer = document.getElementById(`answer${articleId}`).value;
            if (!answer.trim()) {
                alert('Напишите ответ!');
                return;
            }
            localStorage.setItem(`blog_answer_${articleId}`, answer);
            document.getElementById(`saved${articleId}`).innerHTML = '✅ Ответ сохранен!';
            setTimeout(() => {
                document.getElementById(`saved${articleId}`).innerHTML = '';
            }, 2000);
        }

        function checkAnswer(element, correct) {
            if (element.textContent.trim() === correct) {
                element.classList.add('correct');
                alert('✅ Правильно!');
            } else {
                element.classList.add('wrong');
                alert(`❌ Неправильно. Правильный ответ: ${correct}`);
            }
        }

        function loadPost() {
            const id = getUrlParam('id');
            const article = articles[id];
            const container = document.getElementById('postContainer');
            
            if (!article) {
                container.innerHTML = `
                    <div class="blog-post" style="text-align: center;">
                        <h1>Статья не найдена</h1>
                        <p>К сожалению, такой статьи нет в нашем блоге.</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = `
                <div class="blog-post">
                    <div class="post-header">
                        <div class="post-icon">${article.icon}</div>
                        <h1 class="post-title">${article.title}</h1>
                        <div class="post-date">${article.date}</div>
                    </div>
                    <div class="post-content">
                        ${article.content}
                    </div>
                </div>
            `;
        }

        loadPost();
    </script>
</body>
</html>
