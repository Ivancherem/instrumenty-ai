        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);

        function loadPost() {
            const id = getUrlParam('id');
            const article = articles[id];
            
            if (!article) {
                document.getElementById('postContainer').innerHTML = `
                    <div class="blog-post" style="text-align: center;">
                        <h1>Статья не найдена</h1>
                        <p>К сожалению, такой статьи нет в нашем блоге.</p>
                        <a href="blog.html" class="back-link">← Вернуться к списку статей</a>
                    </div>
                `;
                return;
            }
            
            document.getElementById('postIcon').textContent = article.icon;
            document.getElementById('postTitle').textContent = article.title;
            document.getElementById('postDate').textContent = article.date;
            document.getElementById('postContent').innerHTML = article.content;
        }
