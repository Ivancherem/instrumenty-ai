<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статья — Instrumenty-AI</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%233498db'/%3E%3Ctext x='50' y='70' font-size='60' text-anchor='middle' fill='white' font-weight='bold'%3E📚%3C/text%3E%3C/svg%3E">
    <style>
        .blog-post {
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        .post-header {
            text-align: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid #eee;
        }
        .post-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
        .post-title {
            font-size: 2rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        .post-date {
            color: #999;
            font-size: 0.9rem;
        }
        .post-content {
            line-height: 1.8;
            font-size: 1.1rem;
        }
        .post-content h2 {
            color: #3498db;
            margin: 1.5rem 0 1rem;
        }
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            margin: 2rem 0;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        .task-block {
            background: #f8f9fa;
            padding: 1.5rem;
            border-radius: 15px;
            margin: 1.5rem 0;
            border-left: 4px solid #3498db;
        }
        .task-block h3 {
            color: #3498db;
            margin-bottom: 1rem;
        }
        .quiz-question {
            background: #f0f7ff;
            padding: 1.5rem;
            border-radius: 15px;
            margin: 1rem 0;
        }
        .quiz-option {
            display: block;
            padding: 0.8rem;
            margin: 0.5rem 0;
            background: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .quiz-option:hover {
            background: #e8f4fd;
        }
        .quiz-option.correct {
            background: #27ae60;
            color: white;
        }
        .quiz-option.wrong {
            background: #e74c3c;
            color: white;
        }
        .download-btn {
            display: inline-block;
            background: #27ae60;
            color: white;
            padding: 0.8rem 1.5rem;
            text-decoration: none;
            border-radius: 8px;
            margin: 1rem 0;
        }
        .back-link {
            display: inline-block;
            margin-top: 2rem;
            color: #3498db;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <a href="index.html">📚 Instrumenty-AI</a>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">Главная</a></li>
                <li><a href="tools.html">Инструменты</a></li>
                <li><a href="blog.html">Блог</a></li>
                <li><a href="courses.html">Курсы</a></li>
                <li><a href="my-courses.html">Мои курсы</a></li>
                <li><a href="about.html">О проекте</a></li>
                <li><a href="contacts.html">Контакты</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <div class="blog-post" id="postContainer"></div>
        <a href="blog.html" class="back-link">← Вернуться к списку статей</a>
    </main>

    <footer>
        <p>&copy; 2026 Instrumenty-AI. Образовательный портал.</p>
    </footer>

    <script>
        const articles = {
            1: {
                title: "Как ИИ меняет образование",
                date: "27 марта 2026",
                icon: "🤖",
                video: "https://www.youtube.com/embed/2ePf9rue2oA",
                content: `
                    <h2>Искусственный интеллект в образовании</h2>
                    <p>Искусственный интеллект (ИИ) стремительно меняет подходы к обучению. Сегодня мы видим, как технологии помогают создавать персонализированные образовательные траектории, автоматизировать рутинные задачи преподавателей и делать обучение более увлекательным.</p>
                    
                    <h2>🎬 Видео-урок</h2>
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/2ePf9rue2oA" frameborder="0" allowfullscreen></iframe>
                    </div>
                    
                    <h2>Персонализация обучения</h2>
                    <p>Главное преимущество ИИ в образовании — возможность адаптировать учебный материал под каждого ученика. Системы на основе ИИ анализируют успеваемость, определяют слабые места и предлагают индивидуальные задания.</p>
                    
                    <div class="task-block">
                        <h3>📝 Практическое задание</h3>
                        <p><strong>Задание:</strong> Представьте, что вы учитель. Опишите, как бы вы использовали ИИ для помощи одному из ваших учеников, который отстает по математике.</p>
                        <textarea id="taskAnswer" rows="4" style="width:100%; padding:0.8rem; margin-top:1rem; border:1px solid #ddd; border-radius:8px;" placeholder="Напишите свой ответ здесь..."></textarea>
                        <button class="btn" onclick="saveTaskAnswer(1)" style="margin-top:1rem;">💾 Сохранить ответ</button>
                        <div id="taskSaved" style="color:#27ae60; margin-top:0.5rem;"></div>
                    </div>
                    
                    <h2>📊 Тест для самопроверки</h2>
                    <div class="quiz-question">
                        <p><strong>Вопрос 1:</strong> Что является главным преимуществом ИИ в образовании?</p>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Адаптация материала под ученика')">А) Автоматическая проверка тестов</div>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Адаптация материала под ученика')">Б) Адаптация материала под ученика</div>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Адаптация материала под ученика')">В) Создание презентаций</div>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Адаптация материала под ученика')">Г) Видео-уроки</div>
                    </div>
                    
                    <div class="quiz-question">
                        <p><strong>Вопрос 2:</strong> Что ИИ может проверять автоматически?</p>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Тесты, эссе и устные ответы')">А) Только тесты</div>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Тесты, эссе и устные ответы')">Б) Тесты и эссе</div>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Тесты, эссе и устные ответы')">В) Тесты, эссе и устные ответы</div>
                        <div class="quiz-option" onclick="checkAnswer(this, 'Тесты, эссе и устные ответы')">Г) Только устные ответы</div>
                    </div>
                    
                    <div id="quizResult" style="margin-top:1rem; padding:1rem; background:#e8f4fd; border-radius:10px; display:none;"></div>
                    <button class="btn" onclick="checkAllAnswers()">Проверить все ответы</button>
                    
                    <div class="task-block">
                        <h3>📥 Материалы для скачивания</h3>
                        <p>Скачайте презентацию по теме:</p>
                        <a href="#" class="download-btn" onclick="downloadMaterial()">📄 Скачать презентацию (PDF)</a>
                    </div>
                `
            },
            2: {
                title: "5 методов эффективного обучения",
                date: "25 марта 2026",
                icon: "📚",
                video: "https://www.youtube.com/embed/5MgBikgcWnY",
                content: `
                    <h2>Научные подходы к обучению</h2>
                    <p>Исследования показывают, что не все методы обучения одинаково эффективны. Вот 5 научно доказанных техник.</p>
                    
                    <div class="video-container">
                        <iframe src="https://www.youtube.com/embed/5MgBikgcWnY" frameborder="0" allowfullscreen></iframe>
                    </div>
                    
                    <h2>1. Активное повторение</h2>
                    <p>Вместо пассивного перечитывания, старайтесь вспоминать материал без подсказок.</p>
                    
                    <div class="task-block">
                        <h3>📝 Практическое задание</h3>
                        <p><strong>Задание:</strong> Возьмите любую тему, которую недавно изучали, и составьте 5 вопросов для самопроверки без использования учебника.</p>
                        <textarea id="taskAnswer" rows="4" style="width:100%; padding:0.8rem; margin-top:1rem; border:1px solid #ddd; border-radius:8px;" placeholder="Напишите свои вопросы..."></textarea>
                        <button class="btn" onclick="saveTaskAnswer(2)" style="margin-top:1rem;">💾 Сохранить вопросы</button>
                    </div>
                `
            }
        };

        function getUrlParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function loadPost() {
            const id = getUrlParam('id');
            const article = articles[id];
            
            if (!article) {
                document.getElementById('postContainer').innerHTML = `
                    <div class="blog-post" style="text-align: center;">
                        <h1>Статья не найдена</h1>
                        <p>К сожалению, такой статьи нет в нашем блоге.</p>
                    </div>
                `;
                return;
            }
            
            document.getElementById('postContainer').innerHTML = `
                <div class="post-header">
                    <div class="post-icon">${article.icon}</div>
                    <h1 class="post-title">${article.title}</h1>
                    <div class="post-date">${article.date}</div>
                </div>
                <div class="post-content">
                    ${article.content}
                </div>
            `;
        }
        
        function checkAnswer(element, correctAnswer) {
            const answer = element.textContent.trim();
            if (answer === correctAnswer) {
                element.classList.add('correct');
                element.classList.remove('wrong');
                alert('✅ Правильно!');
            } else {
                element.classList.add('wrong');
                element.classList.remove('correct');
                alert('❌ Неправильно. Попробуйте еще раз!');
            }
        }
        
        function checkAllAnswers() {
            const resultDiv = document.getElementById('quizResult');
            resultDiv.style.display = 'block';
            resultDiv.innerHTML = '<p>✅ Тест пройден! Вы можете проверить свои знания, отвечая на вопросы выше.</p>';
        }
        
        function saveTaskAnswer(articleId) {
            const answer = document.getElementById('taskAnswer').value;
            if (!answer.trim()) {
                alert('Напишите ответ перед сохранением!');
                return;
            }
            localStorage.setItem(`task_${articleId}`, answer);
            document.getElementById('taskSaved').innerHTML = '✅ Ответ сохранен!';
            setTimeout(() => {
                document.getElementById('taskSaved').innerHTML = '';
            }, 3000);
        }
        
        function downloadMaterial() {
            alert('📄 Скачивание материалов: В разработке. Скоро появится возможность скачать презентацию!');
        }
        
        loadPost();
    </script>
</body>
</html>
